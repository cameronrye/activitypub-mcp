<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>ActivityPub MCP</title>
  <style>
    /* Standalone favicons can't see page CSS vars, so the dot-flip lives here.
       The ink top-left dot flips to paper on dark chrome (honored by Chrome and
       Firefox tab favicons; Safari shows the ink default, which still reads
       against the colored arcs and dots). */
    @media (prefers-color-scheme: dark) { .dot-flip { fill: #FBF7F0 } }
  </style>
  <g fill="none" stroke-linecap="round" stroke-width="12">
    <path d="M24 76 Q50 32 76 24" stroke="#E8552D" />
    <path d="M24 24 Q50 68 76 76" stroke="#2F7D6B" />
  </g>
  <circle class="dot-flip" cx="20" cy="20" r="11" fill="#1A1714" />
  <circle cx="80" cy="20" r="11" fill="#2F7D6B" />
  <circle cx="20" cy="80" r="11" fill="#E8552D" />
  <circle cx="80" cy="80" r="11" fill="#F4B740" />
</svg>
