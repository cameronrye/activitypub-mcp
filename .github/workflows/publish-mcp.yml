name: Publish to MCP Registry

# Publishes server.json to the official MCP registry
# (registry.modelcontextprotocol.io) using GitHub Actions OIDC — no stored
# secret, since the io.github.cameronrye/* namespace is authorized by the
# repo owner's OIDC identity.
#
# Run this AFTER the matching npm version is live: the registry validates that
# the published npm tarball's package.json carries the same `mcpName`. auto-release
# calls it as a reusable workflow after npm publish; it also stays
# workflow_dispatch-able so it can be re-run on its own if a registry push hiccups.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for `mcp-publisher login github-oidc`

jobs:
  publish:
    name: Publish server.json
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Install mcp-publisher
      # Pinned to a specific release and checksum-verified before execution. This
      # job holds the repo's OIDC identity authorized to publish to the official
      # registry namespace, so a moving `latest` URL piped straight into tar would
      # be a supply-chain RCE vector if that upstream release were ever hijacked.
      env:
        MCP_PUBLISHER_VERSION: v1.7.9
        MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
      run: |
        set -euo pipefail
        url="https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
        curl -fsSL "$url" -o mcp-publisher.tar.gz
        echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
        tar -xzf mcp-publisher.tar.gz mcp-publisher
        rm -f mcp-publisher.tar.gz

    - name: Authenticate via GitHub OIDC
      run: ./mcp-publisher login github-oidc

    - name: Publish to the MCP registry
      run: ./mcp-publisher publish

    - name: Confirm the listing
      run: |
        sleep 5
        curl -fsSL "https://registry.modelcontextprotocol.io/v0/servers?search=activitypub-mcp" | head -c 2000 || true
