name: CI

on:
  push:
    branches: [ main, v2 ]
  pull_request:
    branches: [ main, v2 ]

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: Set UTF-8 encoding (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        chcp 65001
        $env:PYTHONIOENCODING="utf-8"
        $env:NODE_OPTIONS="--max-old-space-size=4096"
      shell: powershell

    - name: Typecheck
      run: npm run typecheck
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Run linting
      run: npm run lint
      env:
        NODE_OPTIONS: --max-old-space-size=4096

    - name: Run formatting check
      run: npm run format:check
    
    - name: Validate version stamps
      run: npm run validate:version

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Verify .mcpb tools manifest injects exactly 18 default tools
      # Runs the inject script against a throwaway manifest copy so a tool
      # registration regression (count != 18, or a tool dropping its schema)
      # fails the PR early — not only at release-tag time.
      if: matrix.os != 'windows-latest'
      run: |
        cp manifest.json "${RUNNER_TEMP:-/tmp}/manifest-ci-check.json"
        node scripts/inject-tools-manifest.js "${RUNNER_TEMP:-/tmp}/manifest-ci-check.json" dist/mcp-main.js
        node -e "const m=require('${RUNNER_TEMP:-/tmp}/manifest-ci-check.json'); if(m.tools.length!==18) throw new Error('expected 18 tools, got '+m.tools.length)"

    - name: Check tarball contents
      if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
      run: node scripts/check-tarball-contents.js

    - name: Smoke test published bin
      if: matrix.node-version == '20.x'
      run: node scripts/smoke-test-bin.js

    - name: Run tests
      run: npm test

    # Only the compiled server in dist/** ships to npm consumers, so the
    # blocking gate audits production deps. Dev-only docs-site tooling
    # advisories (esbuild/yaml via astro) are tracked by Dependabot instead.
    - name: Check for security vulnerabilities (production deps)
      run: npm audit --omit=dev --audit-level=high

    - name: Upload build artifacts
      if: matrix.node-version == '20.x' && matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: build-artifacts-${{ github.sha }}
        path: dist/
        retention-days: 7
        if-no-files-found: error

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # The matrix `test` job runs vitest without coverage, so the per-directory
    # thresholds in vitest.config.ts were never actually enforced. This job fails
    # CI when coverage drops below those floors.
    - name: Run tests with coverage enforcement
      run: npm run test:coverage
      env:
        NODE_OPTIONS: --max-old-space-size=4096

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate Biome configuration
      run: npm run validate:biome

    - name: Run Biome linting
      run: npm run lint

    - name: Check formatting
      run: npm run format:check

  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build TypeScript
      run: npm run build
    
    - name: Check build output
      run: |
        if [ ! -f "dist/mcp-main.js" ]; then
          echo "Build failed: mcp-main.js not found"
          exit 1
        fi
        if [ ! -f "dist/mcp-server.js" ]; then
          echo "Build failed: mcp-server.js not found"
          exit 1
        fi
        echo "Build successful"
    
    - name: Test CLI executable
      run: |
        node dist/mcp-main.js --help || echo "CLI help test completed"

  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    # Production deps are what ship to npm; gate on those. Dev-only docs-site
    # tooling advisories surface via Dependabot, not a blocking CI failure.
    - name: Run security audit (production deps)
      run: npm audit --omit=dev --audit-level=high

    - name: Audit production dependencies (must be clean)
      run: npm run audit:prod

    - name: Check for outdated dependencies
      run: npm outdated || true
