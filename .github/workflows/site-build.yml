name: Site Build

# The Astro docs site shares package.json with the server but only builds
# post-merge in deploy-pages.yml. This gate runs the same build on PRs so
# dependabot/Astro breakage is caught before merge, not after.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-site:
    name: Build Astro Site
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        # Astro 6 requires Node >=22.12; mirror the version deploy-pages.yml
        # pins so a green PR guarantees a green production deploy.
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # Same command deploy-pages.yml runs (manifest + astro build + pagefind +
    # search data), so this gate fails on exactly what would break the deploy.
    - name: Build Astro site
      run: npm run build:site
