name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual fallback: auto-release.yml pushes the tag with GITHUB_TOKEN, which
  # cannot trigger this workflow (GitHub anti-recursion). Run this manually
  # against the vX.Y.Z tag to publish + create the release without a re-push.
  workflow_dispatch:

# id-token: write is required for OIDC-based npm provenance attestations.
permissions:
  contents: write
  packages: write
  pull-requests: read
  id-token: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate version stamps
      run: npm run validate:version

    - name: Typecheck
      run: npm run typecheck

    - name: Run tests
      run: npm test

    - name: Run linting
      run: npm run lint

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Check tarball contents
      run: node scripts/check-tarball-contents.js

    - name: Smoke test published bin
      run: node scripts/smoke-test-bin.js

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    # id-token: write must be set on the publishing job too for provenance.
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Publish to npm with provenance
      run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [test, publish-npm]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        if [ -f CHANGELOG.md ]; then
          # Extract changelog for this version
          sed -n "/^## \[${{ steps.get_version.outputs.VERSION }}\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
        else
          echo "Release ${{ steps.get_version.outputs.VERSION }}" > release_notes.md
          echo "" >> release_notes.md
          echo "See commit history for changes." >> release_notes.md
        fi

    - name: Pack release tarball
      run: npm pack

    - name: Create Release
      uses: softprops/action-gh-release@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        # Attach the full npm tarball — individual JS files would have
        # broken inter-module imports if anyone tried to wget+run them.
        files: |
          activitypub-mcp-${{ steps.get_version.outputs.VERSION }}.tgz

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: release-build-v${{ steps.get_version.outputs.VERSION }}
        path: |
          dist/
          package.json
          README.md
          LICENSE
        retention-days: 90
