name: Release

on:
  push:
    tags:
      - 'v*'
  # Called by auto-release.yml as a reusable workflow after it creates the tag.
  # Running it as a called workflow (not via the tag-push event) is what sidesteps
  # the GitHub anti-recursion rule — a GITHUB_TOKEN-pushed tag can't trigger
  # `on: push: tags`, but it CAN be released by calling this workflow inline.
  workflow_call:
    inputs:
      version:
        description: "Version to release (no leading v). Omit to derive from the pushed tag."
        required: false
        type: string
  # Manual fallback: run against the vX.Y.Z tag to publish without a re-push.
  workflow_dispatch:

# Least privilege at the workflow level; individual jobs elevate only what they
# need. The token-bearing publish/release jobs get their grants per-job below.
permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    # The test job runs the full dev dependency tree with lifecycle scripts; it
    # must never hold a write token a compromised dependency could read.
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate version stamps
      run: npm run validate:version

    - name: Typecheck
      run: npm run typecheck

    - name: Run tests
      run: npm test

    - name: Run linting
      run: npm run lint

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Check tarball contents
      run: node scripts/check-tarball-contents.js

    - name: Smoke test published bin
      run: node scripts/smoke-test-bin.js

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    # id-token: write must be set on the publishing job too for provenance.
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      # --ignore-scripts: this job holds NPM_TOKEN and only needs tsc + biome
      # (neither runs install scripts), so we don't execute lifecycle scripts from
      # the full dev dependency tree in the token-bearing publish/release jobs.
      run: npm ci --ignore-scripts

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Publish to npm with provenance
      run: npm publish --provenance --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [test, publish-npm]
    runs-on: ubuntu-latest
    # Only the release-creation needs write; npm publish + provenance live in the
    # separate publish-npm job, so no id-token/packages here.
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        fetch-depth: 0
        # The release upload authenticates via the env GITHUB_TOKEN, not git, so
        # don't persist a write credential while npm ci / the mcpb build run.
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      # --ignore-scripts: this job holds NPM_TOKEN and only needs tsc + biome
      # (neither runs install scripts), so we don't execute lifecycle scripts from
      # the full dev dependency tree in the token-bearing publish/release jobs.
      run: npm ci --ignore-scripts

    - name: Build project (clean first)
      run: npm run clean && npm run build

    - name: Resolve version and tag
      id: get_version
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          VERSION="${{ inputs.version }}"
        else
          VERSION="${GITHUB_REF#refs/tags/v}"
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"

    - name: Generate changelog
      id: changelog
      run: |
        if [ -f CHANGELOG.md ]; then
          # Extract changelog for this version
          sed -n "/^## \[${{ steps.get_version.outputs.VERSION }}\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
        else
          echo "Release ${{ steps.get_version.outputs.VERSION }}" > release_notes.md
          echo "" >> release_notes.md
          echo "See commit history for changes." >> release_notes.md
        fi

    - name: Pack release tarball
      run: npm pack

    - name: Build Claude Desktop Extension (.mcpb)
      # The README's one-click install points at this asset on the latest
      # release, so every release MUST carry it. Build a self-contained bundle
      # (ESM entrypoint needs its own package.json + prod node_modules) per the
      # steps in docs/distribution.md §3.
      run: |
        # Pin the exact version and skip lifecycle scripts: this job holds a
        # contents:write token and produces the one-click .mcpb users install, so
        # an unpinned/script-running mcpb would be a supply-chain RCE/tamper vector
        # (publish-mcp.yml pins mcp-publisher for the same reason).
        npm install -g @anthropic-ai/mcpb@2.1.2 --ignore-scripts
        stage="$(mktemp -d)"
        cp manifest.json package.json package-lock.json "$stage"/
        cp -R dist "$stage"/dist
        ( cd "$stage" && npm ci --omit=dev --ignore-scripts )
        mcpb validate manifest.json
        mcpb pack "$stage" "activitypub-mcp-${{ steps.get_version.outputs.VERSION }}.mcpb"

    - name: Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: false
        # Attach the full npm tarball — individual JS files would have
        # broken inter-module imports if anyone tried to wget+run them — plus
        # the .mcpb bundle the README's one-click Claude Desktop install needs.
        files: |
          activitypub-mcp-${{ steps.get_version.outputs.VERSION }}.tgz
          activitypub-mcp-${{ steps.get_version.outputs.VERSION }}.mcpb

    - name: Upload build artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: release-build-v${{ steps.get_version.outputs.VERSION }}
        path: |
          dist/
          package.json
          README.md
          LICENSE
        retention-days: 90
